name: "Auto Build hiddify"

env:
  DOCKER_REPO: 'hiddify'
  GITHUB_REPO: 'hiddify/hiddify-core'
  DOCKER_FILE: 'Dockerfile-hiddify'
  APP_NAME: 'hiddify'
  WORK_DIR: 'hiddify/hiddify-core'
  
on:
  repository_dispatch:
    types: [Auto Build hiddify]

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  process-dispatch:
    runs-on: ubuntu-latest
    name: "process-dispatch"
    outputs:
      status: ${{ steps.check-repo-dispatch.outputs.status }}
      version: ${{ steps.check-repo-dispatch.outputs.version }}
    steps:
      - id: check-repo-dispatch
        run: |
          EXPECTED_REPO="${{ env.GITHUB_REPO }}"
          ACTUAL_REPO="${{ github.event.client_payload.owner }}/${{ github.event.client_payload.repo }}"
          
          echo "[INFO] 期望的仓库名称: $EXPECTED_REPO"
          echo "[INFO] 实际的仓库名称: $ACTUAL_REPO"
          echo "[INFO] 事件载荷的属主: ${{ github.event.client_payload.owner }}"
          echo "[INFO] 事件载荷的仓库: ${{ github.event.client_payload.repo }}"
          echo "[INFO] 接受的完整载荷: ${{ toJSON(github.event.client_payload) }}"
          
          if [ "$EXPECTED_REPO" = "$ACTUAL_REPO" ]; then
            echo "[INFO] 仓库名称确认成功"
            echo "status=success" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "[ERROR] 仓库名称确认失败"
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
          
  check-version:
    needs: process-dispatch
    if: ${{ needs.process-dispatch.outputs.status == 'success' }}
    runs-on: ubuntu-latest
    name: "check version"
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      commit: ${{ steps.get-version.outputs.commit }}
      go_version: ${{ steps.get-version.outputs.go_version }}
      build_date: ${{ steps.get-version.outputs.build_date }}
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: check version
        id: get-version
        run: |
          LATEST_VERSION=${{ needs.process-dispatch.outputs.version }}
          GO_VERSION=$(curl -s https://go.dev/VERSION?m=text | awk 'NR==1' | sed 's/^go//')
          
          BUILD_DATE=$(date +"%Y-%m-%d %H:%M.%S")
          DATE=$(date "+%Y/%m/%d")
          COMMIT="Build ${{ env.APP_NAME }} $LATEST_VERSION by Github Actions, $DATE"
          
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  create-release:
    needs: check-version
    runs-on: ubuntu-latest
    name: "create release"
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      MSG: ${{ needs.check-version.outputs.commit }}
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: create release
        uses: shogo82148/actions-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          release_name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          body: ${{ env.MSG }}
          draft: false
          prerelease: false
          overwrite: true

  build-docker-image:
    needs: check-version
    runs-on: ubuntu-latest
    name: "build docker image"
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      VERSION: ${{ needs.check-version.outputs.version }}

    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: push images to dockerhub
        uses: docker/build-push-action@v7
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}
        with:
          push: true
          file: docker/${{ env.DOCKER_FILE }}
          platforms: linux/amd64, linux/arm64
          build-args: BRANCH=${{ env.VERSION }}
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:latest
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}

  build-releases:
    needs: check-version
    runs-on: ubuntu-latest
    name: build releases
    env:
      CGO_ENABLED: 0
      BINARY: hiddify
      VERSION: ${{ needs.check-version.outputs.version }}
      GO_VERSION: ${{ needs.check-version.outputs.go_version }}
      BUILD_DATE: ${{ needs.check-version.outputs.build_date }}
      MSG: ${{ needs.check-version.outputs.commit }}
      BUILD_TAGS: with_gvisor,with_quic,with_wireguard,with_utls,with_clash_api,with_grpc,with_awg,tfogo_checklinkname0,with_naive_outbound,with_conntrack,with_dhcp,with_low_memory,with_purego
      LDFLAGS: >-
        -buildid=
        -w -s -checklinkname=0
        -buildid=${{ needs.check-version.outputs.version }}

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: install system dependencies
        run: |
          sudo apt-get -qq update --fix-missing
          sudo apt-get install -y build-essential git upx unzip

      - name: clone source repository
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITHUB_REPO }}
          ref: ${{ env.VERSION }}
          fetch-depth: 1
          path: ${{ env.WORK_DIR }}
          submodules: recursive

      - name: download go dependencies
        run: |
          cd ${{ env.WORK_DIR }}
          go mod tidy
          go mod download

      - name: prepare frontend assets
        run: |
          cd ${{ env.WORK_DIR }}
          
          echo "Downloading Yacd-meta UI assets..."
          curl -fsSL -o webui.zip https://github.com/hiddify/Yacd-meta/archive/gh-pages.zip
          unzip -d ./ -q webui.zip
          rm webui.zip
          
          mkdir -p release
          rm -rf bin/webui
          mv Yacd-meta-gh-pages release/webui

      - name: build binary
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd ${{ env.WORK_DIR }}
          
          echo "Building ${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }} v${{ env.VERSION }}..."
          go build \
            -v \
            -trimpath \
            -ldflags "--extldflags '-static -fpic' ${{ env.LDFLAGS }}" \
            -tags=${{ env.BUILD_TAGS }} \
            -o release/${{ env.BINARY }} \
            ./cmd/main
          
          echo "Compressing binary with UPX..."
          upx --lzma release/${{ env.BINARY }}
          
          echo "Build completed successfully"
          echo "status=success" >> $GITHUB_OUTPUT

      - name: upload to artifacts
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ env.VERSION }}
          path: ${{ env.WORK_DIR }}/release/
          retention-days: 7

      - name: package release archive
        if: steps.build.outputs.status == 'success'
        run: |
          cd ${{ env.WORK_DIR }}/release
          tar czf ${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${{ env.BINARY }}
          ls -lh ${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

      - name: upload to release
        if: steps.build.outputs.status == 'success'
        uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ env.WORK_DIR }}/release/${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          tag: ${{ env.APP_NAME }}-${{ env.VERSION }}
          overwrite: true
          body: ${{ env.MSG }}

  update-repo:
    needs:
      - check-version
      - create-release
      - build-docker-image
      - build-releases
    runs-on: ubuntu-latest
    name: "update repo"
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      COMMIT: ${{ needs.check-version.outputs.commit }}

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: mark
        run: |
          sudo apt-get install -y jq

          git checkout --orphan tmp_work
          git branch -d main
          
          sed -i -E 's/(\|\s*${{ env.APP_NAME }}\s*\|)\s*\S+\s*\|/\1 ${{ env.VERSION }} \|/' README.md

          # Update repos.json
          IFS='/' read -r owner repo <<< "${{ env.GITHUB_REPO }}"
          jq --arg owner "$owner" --arg repo "$repo" --arg new_version "${{ env.VERSION }}" \
              'map(if .owner == $owner and .repo == $repo then .version = $new_version else . end)' \
              .github/workflows/repos.json > update_repos.json
          mv update_repos.json .github/workflows/repos.json

      - name: upload to repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ env.COMMIT }}
          create_branch: true
          branch: main
          push_options: --force

      - name: delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "${{ env.APP_NAME }}"
          retain_days: 0
          keep_minimum_runs: 0
          delete_run_by_conclusion_pattern: "cancelled, skipped, success"
