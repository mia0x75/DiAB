name: "Auto Build OpenList"

env:
  DOCKER_REPO: "openlist"
  GITHUB_REPO: "OpenListTeam/OpenList"
  DOCKER_FILE: "Dockerfile-OpenList"
  APP_NAME: "OpenList"

on:
  repository_dispatch:
    types: [Auto Build OpenList]

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  process-dispatch:
    runs-on: ubuntu-latest
    name: "process dispatch"
    outputs:
      status: ${{ steps.check-repo-dispatch.outputs.status }}
    steps:
      - id: check-repo-dispatch
        run: |
          EXPECTED_REPO="${{ env.GITHUB_REPO }}"
          ACTUAL_REPO="${{ github.event.client_payload.owner }}/${{ github.event.client_payload.repo }}"

          echo "[INFO] 期望的仓库名称: $EXPECTED_REPO"
          echo "[INFO] 实际的仓库名称: $ACTUAL_REPO"
          echo "[INFO] 事件载荷的属主: ${{ github.event.client_payload.owner }}"
          echo "[INFO] 事件载荷的仓库: ${{ github.event.client_payload.repo }}"
          echo "[INFO] 接受的完整载荷: ${{ toJSON(github.event.client_payload) }}"

          if [ "$EXPECTED_REPO" = "$ACTUAL_REPO" ]; then
            echo "[INFO] 仓库名称确认成功"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "[ERROR] 仓库名称确认失败"
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  check-version:
    needs: process-dispatch
    if: ${{ needs.process-dispatch.outputs.status == 'success' }}
    runs-on: ubuntu-latest
    name: "check version"
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      commit: ${{ steps.get-version.outputs.commit }}
      go_version: ${{ steps.get-version.outputs.go_version }}
      build_date: ${{ steps.get-version.outputs.build_date }}
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: check version
        id: get-version
        run: |
          LATEST_VERSION="${{ github.event.client_payload.version }}"
          GO_VERSION=$(curl -s https://go.dev/VERSION?m=text | awk 'NR==1' | sed 's/^go//')

          BUILD_DATE=$(date +"%Y-%m-%d %H:%M.%S")
          DATE=$(date "+%Y/%m/%d")
          COMMIT="Build ${{ env.APP_NAME }} $LATEST_VERSION by Github Actions, $DATE"

          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  create-release:
    needs: check-version
    runs-on: ubuntu-latest
    name: "create release"
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      MSG: ${{ needs.check-version.outputs.commit }}
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: create release
        uses: shogo82148/actions-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          release_name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          body: ${{ env.MSG }}
          draft: false
          prerelease: false
          overwrite: true

  build-docker-image:
    needs: check-version
    runs-on: ubuntu-latest
    name: "build docker image"
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      VERSION: ${{ needs.check-version.outputs.version }}

    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Default (v3) image
        uses: docker/build-push-action@v7
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}
        with:
          push: true
          file: docker/${{ env.DOCKER_FILE }}
          platforms: linux/amd64, linux/arm64
          build-args: |
            BRANCH=${{ env.VERSION }}
            GOAMD64_VERSION=v3
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:latest
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}

      - name: Build and push Compat (v1) image
        uses: docker/build-push-action@v7
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}
        with:
          push: true
          file: docker/${{ env.DOCKER_FILE }}
          platforms: linux/amd64, linux/arm64
          build-args: |
            BRANCH=${{ env.VERSION }}
            GOAMD64_VERSION=v1
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:latest-compat
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}-compat

  build-releases:
    needs: check-version
    runs-on: ubuntu-latest
    name: build releases
    env:
      CGO_ENABLED: 1
      BINARY: openlist
      VERSION: ${{ needs.check-version.outputs.version }}
      GO_VERSION: ${{ needs.check-version.outputs.go_version }}
      BUILD_DATE: ${{ needs.check-version.outputs.build_date }}
      MSG: ${{ needs.check-version.outputs.commit }}
      FRONTEND_REPO: "OpenListTeam/OpenList-Frontend"

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
        include:
          - goarch: amd64
            musl: x86_64-linux-musl-cross.tgz
            cc: x86_64-linux-musl-gcc
          - goarch: arm64
            musl: aarch64-linux-musl-cross.tgz
            cc: aarch64-linux-musl-gcc

    steps:
      - name: checkout repository
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITHUB_REPO }}
          fetch-depth: 0

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: initialize environment
        run: |
          sudo apt-get -qq update --fix-missing
          sudo apt-get install -y build-essential git musl-dev musl-tools curl jq

      - name: set up cross-compile environment
        run: |
          curl -L -o ${{ matrix.musl }} "https://github.com/OpenListTeam/musl-compilers/releases/latest/download/${{ matrix.musl }}"
          sudo tar xf ${{ matrix.musl }} --strip-components 1 -C /usr/local
          rm -f ${{ matrix.musl }}

      - name: download dependencies
        run: |
          go mod tidy
          go mod download

      - name: fetch frontend
        run: |
          pre_release_json=$(curl -fsSL --max-time 2 "https://api.github.com/repos/${{ env.FRONTEND_REPO }}/releases/latest")
          pre_release_assets=$(echo "$pre_release_json" | jq -r '.assets[].browser_download_url')

          release_tar_url=$(echo "$pre_release_assets" | grep "openlist-frontend-dist" | grep -v "lite" | grep "\.tar\.gz$" | head -n 1)

          curl -fsSL "$release_tar_url" -o dist.tar.gz
          rm -rf public/dist && mkdir -p public/dist
          tar -zxvf dist.tar.gz -C public/dist
          rm -rf dist.tar.gz

      - name: set environment variables
        id: variables
        run: |
          goVersion=$(go version | sed 's/go version //')
          buildDate=$(date +'%F %T %z')
          gitAuthor="The OpenList Projects Contributors <noreply@openlist.team>"
          commit=$(git log --pretty=format:"%h" -1)
          webVersion=$(curl -fsSL --max-time 2 "https://api.github.com/repos/${{ env.FRONTEND_REPO }}/releases/latest" | grep "tag_name" | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//g;s/ //g')
          ldflags="\
            -w -s \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$buildDate' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$gitAuthor' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$commit' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=${{ env.VERSION }}' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=$webVersion'"
          echo "ldflags=$ldflags" >> $GITHUB_ENV

      - name: build application
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: v3
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p release
          CGO_LDFLAGS="-static" go build -v -trimpath -ldflags "-linkmode external -extldflags '-static -fpic' ${{ env.ldflags }}" -tags=jsoniter -o release/openlist
          echo "status=success" >> $GITHUB_OUTPUT

      - name: upload binaries to artifact
        if: steps.build.outputs.status == 'success' && !cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: openlist-${{ matrix.goos }}-${{ matrix.goarch }}-${{ env.VERSION }}
          path: release/

      - name: prepare release
        if: steps.build.outputs.status == 'success' && !cancelled()
        run: |
          cd release
          tar czf openlist-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz openlist
          rm openlist

      - name: upload binaries to release
        id: release
        if: steps.build.outputs.status == 'success' && !cancelled()
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/*
          file_glob: true
          tag: ${{ env.APP_NAME }}-${{ env.VERSION }}
          overwrite: true
          body: ${{ env.MSG }}

  update-repo:
    needs:
      - check-version
      - create-release
      - build-docker-image
      - build-releases
    runs-on: ubuntu-latest
    name: "update repo"
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      COMMIT: ${{ needs.check-version.outputs.commit }}

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: mark
        run: |
          sudo apt-get install -y jq

          git checkout --orphan tmp_work
          git branch -d main

          sed -i -E 's/(\|\s*${{ env.APP_NAME }}\s*\|)\s*\S+\s*\|/\1 ${{ env.VERSION }} \|/' README.md

          # Update repos.json
          IFS='/' read -r owner repo <<< "${{ env.GITHUB_REPO }}"
          jq --arg owner "$owner" --arg repo "$repo" --arg new_version "${{ env.VERSION }}" \
              'map(if .owner == $owner and .repo == $repo then .version = $new_version else . end)' \
              .github/workflows/repos.json > update_repos.json
          mv update_repos.json .github/workflows/repos.json

      - name: upload to repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ env.COMMIT }}
          create_branch: true
          branch: main
          push_options: --force

      - name: delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "${{ env.APP_NAME }}"
          retain_days: 0
          keep_minimum_runs: 0
          delete_run_by_conclusion_pattern: "cancelled, skipped, success"
